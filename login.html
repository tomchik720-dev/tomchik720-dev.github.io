<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Авторизация | SHADOW</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }
        body {
            background: #0b0c0e;
            background-image: radial-gradient(rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 400px;
            padding: 40px;
            background: rgba(20,20,25,0.5);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 24px;
            backdrop-filter: blur(10px);
        }
        .back-link {
            display: inline-block;
            margin-bottom: 30px;
            color: #888;
            text-decoration: none;
        }
        .back-link:hover {
            color: #fff;
        }
        h1 {
            text-align: center;
            margin-bottom: 40px;
            font-size: 32px;
        }
        input {
            width: 100%;
            padding: 14px;
            background: #0b0c0e;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: #fff;
            margin-bottom: 20px;
        }
        button {
            width: 100%;
            padding: 14px;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover {
            border-color: rgba(255,255,255,0.2);
        }
        .link {
            text-align: center;
            margin-top: 20px;
        }
        .link a {
            color: #888;
            text-decoration: none;
        }
        .link a:hover {
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link">← На главную</a>
        <h1>Авторизация</h1>
        <input type="text" placeholder="Логин">
        <input type="password" placeholder="Пароль">
        <button>Войти</button>
        <div class="link">
            <a href="#">Нет аккаунта? Регистрация</a>
        </div>
    </div>
</body>
</html>
