<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHADOW CHEAT | Главная</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }
        body {
            background: #0b0c0e;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: radial-gradient(rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px;
            text-align: center;
        }
        .logo {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #fff, #a0a0a0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .sub {
            color: #888;
            font-size: 18px;
            margin-bottom: 60px;
        }
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
            margin-top: 40px;
        }
        .menu-item {
            background: rgba(20,20,25,0.5);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 24px;
            padding: 40px 30px;
            text-decoration: none;
            color: #fff;
            transition: 0.3s;
        }
        .menu-item:hover {
            border-color: rgba(255,255,255,0.2);
            transform: translateY(-5px);
        }
        .menu-icon {
            font-size: 48px;
            margin-bottom: 20px;
        }
        .menu-item h2 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        .menu-item p {
            color: #888;
            font-size: 14px;
        }
        @media (max-width: 600px) {
            .menu-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">SHADOW CHEAT</div>
        <div class="sub">Выбери раздел</div>
        
        <div class="menu-grid">
            <a href="login.html" class="menu-item">
                <div class="menu-icon">🔑</div>
                <h2>Авторизация</h2>
                <p>Вход и регистрация</p>
            </a>
            <a href="features.html" class="menu-item">
                <div class="menu-icon">⚡</div>
                <h2>Функции</h2>
                <p>Все возможности чита</p>
            </a>
            <a href="pricing.html" class="menu-item">
                <div class="menu-icon">💰</div>
                <h2>Цены</h2>
                <p>Тарифы и подписки</p>
            </a>
            <a href="#" class="menu-item" onclick="alert('Скоро')">
                <div class="menu-icon">📁</div>
                <h2>Конфиги</h2>
                <p>Скрипты и настройки</p>
            </a>
        </div>
    </div>
</body>
</html>
