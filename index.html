<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow cheat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        body {
            background: #0a0c12;
            color: #fff;
            min-height: 100vh;
        }

        /* Верхний левый угол */
        .top-left {
            position: absolute;
            top: 50px;
            left: 60px;
        }

        .site-title {
            font-size: 48px;
            font-weight: 400;
            color: #fff;
            margin-bottom: 35px;
            letter-spacing: 1px;
        }

        /* Меню */
        .left-menu {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .menu-item {
            color: #aaa;
            text-decoration: none;
            font-size: 18px;
            font-weight: 400;
            transition: 0.2s;
            width: fit-content;
        }

        .menu-item:hover {
            color: #fff;
        }

        /* Кнопка "как пользоваться" */
        .howto-btn {
            margin-top: 30px;
            background: transparent;
            border: 2px solid #4a90e2;
            color: #4a90e2;
            padding: 12px 28px;
            font-size: 16px;
            font-weight: 400;
            cursor: pointer;
            transition: 0.2s;
            width: fit-content;
            border-radius: 2px;
        }

        .howto-btn:hover {
            background: #4a90e2;
            color: #fff;
        }

        /* Ссылки внизу */
        .footer {
            position: absolute;
            bottom: 40px;
            right: 60px;
            color: #2a2a2a;
            font-size: 16px;
        }

        a {
            text-decoration: none;
            color: inherit;
        }
    </style>
</head>
<body>
    <div class="top-left">
        <div class="site-title">Shadow cheat</div>
        <div class="left-menu">
            <a href="features.html" class="menu-item">функции</a>
            <a href="pricing.html" class="menu-item">цены</a>
            <a href="instruction.html" class="menu-item">инструкция по скачиванию →</a>
        </div>
        
        <!-- Кнопка "как пользоваться" под меню -->
        <button class="howto-btn" onclick="window.location.href='howto.html'">как пользоваться</button>
    </div>

    <div class="footer">harmonqqgg</div>
</body>
</html>
